<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Tặng Món Quà Đặc Biệt!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            color: #d63384;
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Hộp quà */
        .gift-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .gift-container:hover {
            transform: scale(1.05);
        }

        .gift-box {
            width: 150px;
            height: 150px;
            background-color: #ff4757;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background-color: #ffa502;
            left: 50%;
            transform: translateX(-50%);
        }

        .gift-box::after {
            content: '';
            position: absolute;
            height: 30px;
            width: 100%;
            background-color: #ffa502;
            top: 50%;
            transform: translateY(-50%);
        }

        .gift-lid {
            width: 170px;
            height: 40px;
            background-color: #ff6b81;
            position: absolute;
            top: -20px;
            left: -10px;
            border-radius: 5px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
            transition: all 0.5s ease;
            z-index: 2;
        }

        .gift-lid::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background-color: #ffa502;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Khung hiển thị Món quà / Lời chúc */
        .card {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            z-index: 10;
            animation: popup 0.5s forwards ease-out;
        }

        @keyframes popup {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .card h2 {
            color: #ff4757;
            margin-bottom: 15px;
        }

        .card p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .btn-close {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-close:hover {
            background-color: #ff6b81;
        }

        /* Hiệu ứng tim bay */
        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 20px;
            animation: float 3s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="instruction">🎁 Bấm vào hộp quà để mở nhé! 🎁</h1>

    <div class="gift-container" onclick="openGift()">
        <div class="gift-lid" id="lid"></div>
        <div class="gift-box"></div>
    </div>

    <!-- Khung Lời Chúc & Món Quà -->
    <div class="card" id="card">
        <h2>💖 Gửi Tặng Người Thân Yêu! 💖</h2>
        <p id="message">
            Chúc bạn/người thân luôn luôn mạnh khỏe, tràn ngập niềm vui và gặp thật nhiều may mắn trong cuộc sống! 
            <br><br>
            <strong>Món quà của bạn:</strong> Một buổi đi ăn/đi chơi tự chọn cùng mình nhé! 🎟️✨
        </p>
        <button class="btn-close" onclick="closeGift()">Cảm ơn nha! 🥰</button>
    </div>

    <script>
        function openGift() {
            // Mở nắp hộp quà
            document.getElementById('lid').style.transform = 'translateY(-80px) rotate(-15deg)';
            
            // Ẩn tiêu đề hướng dẫn
            document.getElementById('instruction').style.opacity = '0';

            // Hiện thiệp chúc mừng sau 300ms
            setTimeout(() => {
                document.getElementById('card').style.display = 'block';
                createHearts();
            }, 300);
        }

        function closeGift() {
            document.getElementById('card').style.display = 'none';
            document.getElementById('lid').style.transform = 'none';
            document.getElementById('instruction').style.opacity = '1';
        }

        // Tạo hiệu ứng trái tim bay
        function createHearts() {
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(heart);

                    setTimeout(() => {
                        heart.remove();
                    }, 3000);
                }, i * 150);
            }
        }
    </script>
</body>
</html>
