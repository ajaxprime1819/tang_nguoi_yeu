<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Kỷ Niệm Của Chúng Ta ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fefefe 0%, #f3e7e9 100%);
            color: #333;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Tiêu đề album */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #d63384;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            color: #6c757d;
            font-size: 1rem;
        }

        /* Khung chứa danh sách ảnh (Grid Layout) */
        .gallery-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        /* Khung cho từng tấm ảnh */
        .gallery-item {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            background: #fff;
            cursor: pointer;
            aspect-ratio: 4/5; /* Tỉ lệ khung ảnh */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(214, 51, 132, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        /* Lớp phủ chú thích khi rê chuột vào */
        .caption-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
            padding: 20px 15px 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .gallery-item:hover .caption-overlay {
            opacity: 1;
        }

        .caption-overlay h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .caption-overlay p {
            font-size: 0.85rem;
            color: #ddd;
        }

        /* Modal xem ảnh phóng to */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .modal-img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            animation: zoomIn 0.3s ease;
        }

        .modal-caption {
            color: #fff;
            margin-top: 15px;
            font-size: 1.1rem;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #ff758c;
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Responsive cho điện thoại */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .gallery-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Precious Moments 📸</h1>
        <p>Bộ sưu tập những khoảnh khắc ngọt ngào nhất</p>
    </header>

    <div class="gallery-container">
        <!-- Ảnh 1 -->
        <div class="gallery-item" onclick="openModal('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=800', 'Chuyến đi đầu tiên', 'Đà Lạt - 2024')">
            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=400" alt="Khoảnh khắc 1">
            <div class="caption-overlay">
                <h3>Chuyến đi đầu tiên</h3>
                <p>Đà Lạt - 2024</p>
            </div>
        </div>

        <!-- Ảnh 2 -->
        <div class="gallery-item" onclick="openModal('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=800', 'Buổi hẹn hò cà phê', 'Góc quán quen thuộc')">
            <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=400" alt="Khoảnh khắc 2">
            <div class="caption-overlay">
                <h3>Buổi hẹn hò cà phê</h3>
                <p>Góc quán quen thuộc</p>
            </div>
        </div>

        <!-- Ảnh 3 -->
        <div class="gallery-item" onclick="openModal('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=800', 'Sinh nhật em yêu', 'Bữa tiệc nhỏ ấm áp')">
            <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=400" alt="Khoảnh khắc 3">
            <div class="caption-overlay">
                <h3>Sinh nhật em yêu</h3>
                <p>Bữa tiệc nhỏ ấm áp</p>
            </div>
        </div>

        <!-- Ảnh 4 -->
        <div class="gallery-item" onclick="openModal('https://images.unsplash.com/photo-1494774157365-9e04c6720e47?q=80&w=800', 'Chiều hoàng hôn', 'Cùng nhau ngắm mặt trời lặn')">
            <img src="https://images.unsplash.com/photo-1494774157365-9e04c6720e47?q=80&w=400" alt="Khoảnh khắc 4">
            <div class="caption-overlay">
                <h3>Chiều hoàng hôn</h3>
                <p>Cùng nhau ngắm mặt trời lặn</p>
            </div>
        </div>

        <!-- Thêm các ô ảnh khác tương tự ở đây... -->
    </div>

    <!-- Khung phóng to ảnh (Modal) -->
    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-img" id="imgFull">
        <div class="modal-caption" id="captionText"></div>
    </div>

    <script>
        // Mở ảnh phóng to
        function openModal(src, title, desc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('imgFull');
            const caption = document.getElementById('captionText');

            modal.style.display = 'flex';
            modalImg.src = src;
            caption.innerHTML = `<strong>${title}</strong><br><small style="opacity: 0.8">${desc}</small>`;
        }

        // Đóng ảnh phóng to
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // Bấm phím ESC hoặc bấm ra ngoài ảnh để đóng
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                closeModal();
            }
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
