<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Em - Tình Yêu Của Anh ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng trái tim rơi */
        .heart {
            position: absolute;
            color: #ff4b2b;
            animation: fall linear infinite;
            z-index: 1;
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) scale(1.2);
                opacity: 0;
            }
        }

        /* Khung thiệp */
        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff758c;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        h1 {
            color: #d63384;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .btn {
            background: linear-gradient(45deg, #ff758c, #ff7eb3);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.6);
        }

        /* Lời nhắn ẩn */
        .message-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 240, 243, 0.9);
            border-radius: 12px;
            color: #4a4a4a;
            font-size: 15px;
            line-height: 1.6;
            border-left: 4px solid #ff758c;
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Thay link ảnh em bé của bạn vào src bên dưới nhé -->
        <img src="https://images.unsplash.com/photo-1518895949257-7621c3c786d7?q=80&w=300" alt="Avatar" class="avatar">
        
        <h1>Chúc Mừng Ngày Đặc Biệt! ❤️</h1>
        <p class="subtitle">Gửi tới công chúa nhỏ của anh</p>

        <button class="btn" onclick="showMessage()">Mở Thư Bí Mật 💌</button>

        <div class="message-box" id="secretMessage">
            Cảm ơn em vì đã đến và làm cho cuộc sống của anh tràn ngập niềm vui. Chúc cho em yêu luôn rạng rỡ, hạnh phúc và xinh đẹp. Yêu em thật nhiều! 🥰✨
        </div>
    </div>

    <script>
        // Hiệu ứng mở lời nhắn
        function showMessage() {
            const msg = document.getElementById('secretMessage');
            if (msg.style.display === 'block') {
                msg.style.display = 'none';
            } else {
                msg.style.display = 'block';
            }
        }

        // Tạo hiệu ứng trái tim rơi liên tục
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // Vị trí ngẫu nhiên theo chiều ngang
            heart.style.left = Math.random() * 100 + 'vw';
            
            // Kích thước ngẫu nhiên
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            
            // Tốc độ rơi ngẫu nhiên (3s - 7s)
            const duration = Math.random() * 4 + 3;
            heart.style.animationDuration = duration + 's';
            
            document.body.appendChild(heart);

            // Xóa trái tim sau khi rơi xong để tránh nặng máy
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Tạo trái tim mỗi 300ms
        setInterval(createHeart, 300);
    </script>
</body>
</html>
