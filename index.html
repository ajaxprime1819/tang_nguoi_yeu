<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Settings Panel</title>
    <!-- Icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Khung Panel Chính */
        .panel-container {
            width: 320px;
            background: #090d12;
            border: 1px solid #1a2332;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            display: flex;
            overflow: hidden;
            color: #fff;
        }

        /* Thanh Sidebar Icon Bên Trái */
        .sidebar {
            width: 60px;
            background: #05080c;
            border-right: 1px solid #161f2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            gap: 15px;
        }

        .sidebar .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2fb1db;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar .icon-btn:hover {
            background: rgba(47, 177, 219, 0.1);
        }

        .sidebar .icon-btn.active {
            border: 1.5px solid #2fb1db;
            box-shadow: 0 0 10px rgba(47, 177, 219, 0.3);
        }

        /* Phần Nội Dung Bên Phải */
        .main-content {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Tiêu đề Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .header .title {
            color: #fff;
        }

        .header .title span {
            color: #2fb1db;
        }

        .header .close-btn {
            color: #2fb1db;
            cursor: pointer;
            font-size: 16px;
        }

        .category-title {
            text-align: center;
            color: #2fb1db;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Danh Sách Tùy Chọn (Checklist) */
        .option-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        /* Tùy Chỉnh Nút Checkbox */
        .checkbox-custom {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #2fb1db;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #05080c;
            font-size: 12px;
            font-weight: bold;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .option-item input[type="checkbox"] {
            display: none;
        }

        /* Khi bỏ chọn checkbox */
        .option-item input[type="checkbox"]:not(:checked) + .checkbox-custom {
            background: transparent;
            border: 2px solid #2fb1db;
            color: transparent;
        }

        .option-label {
            font-size: 14px;
            font-weight: 600;
            color: #2fb1db;
            user-select: none;
        }
    </style>
</head>
<body>

<div class="panel-container">
    <!-- Sidebar bên trái -->
    <div class="sidebar">
        <div class="icon-btn"><i class="fa-solid fa-crosshairs"></i></div>
        <div class="icon-btn"><i class="fa-solid fa-swords"></i></div>
        <div class="icon-btn active"><i class="fa-solid fa-eye"></i></div>
        <div class="icon-btn"><i class="fa-solid fa-user"></i></div>
    </div>

    <!-- Nội dung chính bên phải -->
    <div class="main-content">
        <div class="header">
            <div class="title">System <span>Mods</span></div>
            <div class="close-btn"><i class="fa-solid fa-xmark"></i></div>
        </div>

        <div class="category-title">Display Settings</div>

        <div class="option-list">
            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">Enable System</span>
            </label>

            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">Show Lines</span>
            </label>

            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">Show Bounding Box</span>
            </label>

            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">Show Health Bar</span>
            </label>

            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">Show Distance</span>
            </label>

            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">FOV Overlay</span>
            </label>

            <label class="option-item">
                <input type="checkbox" checked>
                <div class="checkbox-custom"><i class="fa-solid fa-check"></i></div>
                <span class="option-label">Target Lock</span>
            </label>
        </div>
    </div>
</div>

</body>
</html>
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input ID Form</title>
    <!-- FontAwesome Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Khung chứa ô nhập ID */
        .id-box {
            background: #090d12;
            border: 1px solid #1a2332;
            border-radius: 10px;
            padding: 20px;
            width: 320px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .id-box label {
            color: #2fb1db;
            font-size: 14px;
            font-weight: 600;
        }

        /* Khung bao ngoài input để đặt icon */
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 12px;
            color: #2fb1db;
            font-size: 14px;
        }

        /* Ô nhập dữ liệu */
        .input-group input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            background: #05080c;
            border: 1px solid #161f2e;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        /* Hiệu ứng khi bấm vào ô nhập */
        .input-group input:focus {
            border-color: #2fb1db;
            box-shadow: 0 0 8px rgba(47, 177, 219, 0.3);
        }

        /* Nút xác nhận */
        .btn-submit {
            background: #2fb1db;
            color: #05080c;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-submit:hover {
            background: #2593b8;
        }
    </style>
</head>
<body>

<div class="id-box">
    <label for="userId">Nhập ID người dùng:</label>
    <div class="input-group">
        <i class="fa-solid fa-id-card"></i>
        <input type="text" id="userId" placeholder="Ví dụ: 123456789">
    </div>
    <button class="btn-submit" onclick="submitId()">Xác nhận</button>
</div>

<script>
    function submitId() {
        const idValue = document.getElementById('userId').value;
        if (idValue.trim() === '') {
            alert('Vui lòng nhập ID!');
        } else {
            alert('Đã nhận ID: ' + idValue);
        }
    }
</script>

</body>
</html>
