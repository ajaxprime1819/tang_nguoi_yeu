<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Game Hứng Bóng</title>
    <style>
        body {
            background-color: #222;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        canvas {
            background: #111;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            cursor: none;
        }
    </style>
</head>
<body>

    <h1>Game Hứng Bóng</h1>
    <p>Di chuyển chuột để điều khiển thanh đỡ!</p>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. Khai báo thông số game
        let score = 0;
        let gameOver = false;

        // Quả bóng
        let ball = {
            x: 200,
            y: 50,
            radius: 10,
            dx: 3,
            dy: 3,
            color: "#ff0055"
        };

        // Thanh đỡ
        let paddle = {
            width: 80,
            height: 12,
            x: 160,
            y: 470,
            color: "#00ffcc"
        };

        // 2. Lắng nghe sự kiện di chuyển chuột
        canvas.addEventListener("mousemove", function(e) {
            let rect = canvas.getBoundingClientRect();
            paddle.x = e.clientX - rect.left - paddle.width / 2;
        });

        // 3. Vòng lặp cập nhật trạng thái game
        function update() {
            if (gameOver) return;

            // Di chuyển bóng
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Va chạm với tường trái/phải
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.dx = -ball.dx;
            }

            // Va chạm với tường trên
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Va chạm với thanh đỡ
            if (
                ball.y + ball.radius >= paddle.y &&
                ball.x >= paddle.x &&
                ball.x <= paddle.x + paddle.width
            ) {
                ball.dy = -ball.dy;
                score += 10;
                // Tăng tốc độ bóng một chút khi đập trúng thanh đỡ
                ball.dy *= 1.05;
                ball.dx *= 1.05;
            }

            // Xử lý khi bóng rơi xuống đáy (Thua)
            if (ball.y + ball.radius > canvas.height) {
                gameOver = true;
            }
        }

        // 4. Vẽ các đối tượng lên màn hình
        function draw() {
            // Xóa màn hình cũ
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.fillText("GAME OVER", 110, 230);
                ctx.font = "20px Arial";
                ctx.fillText("Điểm của bạn: " + score, 130, 270);
                return;
            }

            // Vẽ bóng
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();

            // Vẽ thanh đỡ
            ctx.fillStyle = paddle.color;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            // Vẽ điểm số
            ctx.fillStyle = "white";
            ctx.font = "16px Arial";
            ctx.fillText("Điểm: " + score, 10, 25);
        }

        // 5. Vòng lặp chính của Game (Game Loop)
        function gameLoop() {
            update();
            draw();
            if (!gameOver) {
                requestAnimationFrame(gameLoop);
            }
        }

        // Bắt đầu chạy game
        gameLoop();
    </script>
</body>
</html>
