<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Trực Tuyến</title>
    <style>
        /* --- CSS STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-box input {
            padding: 8px 12px;
            border-radius: 4px;
            border: none;
            width: 250px;
            outline: none;
        }

        .container {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 10px;
        }

        /* Danh sách sản phẩm */
        .products-grid {
            flex: 3;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .product-title {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .product-price {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .btn-add {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: #219150;
        }

        /* Giỏ hàng */
        .cart-section {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .cart-title {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .cart-controls button {
            background: #eee;
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: bold;
        }

        .btn-remove {
            color: #e74c3c;
            background: none !important;
            margin-left: 8px;
        }

        .cart-total {
            border-top: 2px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .btn-checkout {
            width: 100%;
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        .btn-checkout:hover {
            background: #d35400;
        }
    </style>
</head>
<body>

    <header>
        <h2>Shop Online</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm sản phẩm..." onkeyup="searchProducts()">
        </div>
    </header>

    <div class="container">
        <!-- Khu vực Sản phẩm -->
        <div class="products-grid" id="productGrid">
            <!-- Sản phẩm sẽ được hiển thị bằng JavaScript -->
        </div>

        <!-- Khu vực Giỏ hàng -->
        <div class="cart-section">
            <h3 class="cart-title">Giỏ Hàng Của Bạn</h3>
            <div id="cartItems">
                <p>Giỏ hàng đang trống.</p>
            </div>
            <div class="cart-total">
                <span>Tổng tiền:</span>
                <span id="cartTotal">0 VNĐ</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Thanh Toán</button>
        </div>
    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---

        // 1. Khai báo danh sách sản phẩm mẫu
        const products = [
            { id: 1, name: "Áo Thun Nam Premium", price: 150000, image: "https://via.placeholder.com/150/24c6dc/ffffff?text=Ao+Thun" },
            { id: 2, name: "Quần Jean Slimfit", price: 350000, image: "https://via.placeholder.com/150/514a9d/ffffff?text=Quan+Jean" },
            { id: 3, name: "Giày Sneaker Thể Thao", price: 550000, image: "https://via.placeholder.com/150/f12711/ffffff?text=Giay+Sneaker" },
            { id: 4, name: "Mũ Cót Thời Trang", price: 90000, image: "https://via.placeholder.com/150/f5af19/ffffff?text=Mu+Cap" },
            { id: 5, name: "Balo Du Lịch Chống Nước", price: 420000, image: "https://via.placeholder.com/150/11998e/ffffff?text=Balo" }
        ];

        let cart = [];

        // 2. Hàm hiển thị sản phẩm ra màn hình
        function renderProducts(list) {
            const productGrid = document.getElementById('productGrid');
            productGrid.innerHTML = '';

            list.forEach(product => {
                const productHTML = `
                    <div class="product-card">
                        <img src="${product.image}" alt="${product.name}">
                        <h4 class="product-title">${product.name}</h4>
                        <div class="product-price">${product.price.toLocaleString('vi-VN')} VNĐ</div>
                        <button class="btn-add" onclick="addToCart(${product.id})">Thêm vào giỏ</button>
                    </div>
                `;
                productGrid.innerHTML += productHTML;
            });
        }

        // 3. Hàm thêm sản phẩm vào giỏ hàng
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);

            if (cartItem) {
                cartItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        // 4. Hàm cập nhật lại giỏ hàng và tổng tiền
        function updateCart() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p>Giỏ hàng đang trống.</p>';
                cartTotal.innerText = '0 VNĐ';
                return;
            }

            cartItemsContainer.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                const itemHTML = `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>${item.price.toLocaleString('vi-VN')} VNĐ</small>
                        </div>
                        <div class="cart-controls">
                            <button onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="changeQuantity(${item.id}, 1)">+</button>
                            <button class="btn-remove" onclick="removeFromCart(${item.id})">✕</button>
                        </div>
                    </div>
                `;
                cartItemsContainer.innerHTML += itemHTML;
            });

            cartTotal.innerText = `${total.toLocaleString('vi-VN')} VNĐ`;
        }

        // 5. Thay đổi số lượng
        function changeQuantity(productId, delta) {
            const cartItem = cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.quantity += delta;
                if (cartItem.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCart();
                }
            }
        }

        // 6. Xóa khỏi giỏ hàng
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        // 7. Tìm kiếm sản phẩm
        function searchProducts() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filteredProducts = products.filter(p => p.name.toLowerCase().includes(keyword));
            renderProducts(filteredProducts);
        }

        // 8. Thanh toán giả lập
        function checkout() {
            if (cart.length === 0) {
                alert("Giỏ hàng của bạn đang trống!");
            } else {
                alert("Cảm ơn bạn đã đặt hàng! Đơn hàng sẽ sớm được xử lý.");
                cart = [];
                updateCart();
            }
        }

        // Chạy hàm hiển thị lần đầu khi mở trang
        renderProducts(products);
    </script>
</body>
</html>
